<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Memory Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        form { max-width: 600px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; }
        textarea { height: 150px; }
        button { margin-top: 20px; padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        nav { margin-bottom: 20px; }
        nav a { margin-right: 15px; }
    </style>
</head>
<body>
    <h1 th:text="${memory.id != null ? 'Edit Memory' : 'Add New Memory'}">Memory Form</h1>

    <nav>
        <a href="/">Dashboard</a>
        <a href="/memory">Memory List</a>
    </nav>

    <form th:action="${memory.id != null ? '/memory/' + memory.id : '/memory'}"
          th:object="${memory}" method="post">
        <input type="hidden" th:field="*{id}">

        <label for="scope">Scope</label>
        <select id="scope" th:field="*{scope}" required>
            <option value="">Select Scope</option>
            <option th:each="s : ${scopes}" th:value="${s}" th:text="${s}"></option>
        </select>

        <label for="userId">User ID</label>
        <input type="text" id="userId" th:field="*{userId}">

        <label for="sessionId">Session ID</label>
        <input type="text" id="sessionId" th:field="*{sessionId}">

        <label for="agentId">Agent ID</label>
        <input type="text" id="agentId" th:field="*{agentId}">

        <label for="data">Data</label>
        <textarea id="data" th:field="*{data}" required></textarea>

        <button type="submit" th:text="${memory.id != null ? 'Update' : 'Create'}">Save</button>
    </form>
</body>
</html>
